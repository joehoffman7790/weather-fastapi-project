name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: weatherapiacregistry765.azurecr.io
  IMAGE_NAME: weather-api

jobs:

  # ── 1. SPLIT: lint is its own job now ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff          # black is gone — ruff covers format checking too

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff  # replaces: black --check .
        run: ruff format --check .

  # ── 2. Tests stay separate — no need to bundle with lint ──────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

  # ── 3. BUILD + DEPLOY: azure/login + az webapp restart → webapps-deploy ──
  build-and-deploy:
    needs: [ lint, test ]             # both must pass before deploy runs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Web App  # replaces: azure/login + az webapp restart
        uses: azure/webapps-deploy@v3
        with:
          app-name: weather-fastapi-joeh6790
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

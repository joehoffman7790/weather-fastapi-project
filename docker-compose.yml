services:
  postgres:
    image: postgres:16
    container_name: weather-postgres
    environment:
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: weather-django
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://weather:${POSTGRES_PASSWORD}@postgres:5432/weather
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: